name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e smalltv

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp .pio/build/smalltv/firmware.bin dist/smalltv-mod-firmware.bin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smalltv-mod-firmware
          path: dist/smalltv-mod-firmware.bin

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/smalltv-mod-firmware.bin
