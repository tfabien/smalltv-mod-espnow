name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# The release-attach step needs write access to create/update the release asset.
permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware (all targets)
        run: pio run -e smalltv -e smalltv_c2 -e smalltv_esp32

      # One app image per target (web-UI OTA + GitHub self-update), plus the
      # merged factory images for first-time USB flashing of the ESP32 boards.
      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp .pio/build/smalltv/firmware.bin               dist/smalltv-mod-firmware.bin
          cp .pio/build/smalltv_c2/firmware.bin            dist/smalltv-mod-firmware-c2.bin
          cp .pio/build/smalltv_c2/firmware.factory.bin    dist/smalltv-mod-firmware-c2.factory.bin
          cp .pio/build/smalltv_esp32/firmware.bin         dist/smalltv-mod-firmware-esp32.bin
          cp .pio/build/smalltv_esp32/firmware.factory.bin dist/smalltv-mod-firmware-esp32.factory.bin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smalltv-mod-firmware
          path: dist/

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
