; PlatformIO project for smalltv-mod
; Three board targets, all a 1.54" 240x240 ST7789 IPS display:
;   env:smalltv       GeekMagic SmallTV,  ESP-12F (ESP8266)
;   env:smalltv_c2    knockoff SmallTV,   ESP32-C2 / ESP8684 (flashed over USB-C/CH340C)
;   env:smalltv_esp32 NMMiner NM-TV-154,  classic ESP32 (WROOM-32E)
;
; Build one:       pio run -e smalltv   /  pio run -e smalltv_c2  /  pio run -e smalltv_esp32
; Build artifact:  .pio/build/<env>/firmware.bin
; Flash via USB:   pio run -e <env> -t upload
; Flash via OTA:   upload firmware.bin through the device web UI (Update tab)
;
; License: WTFPL

[platformio]
default_envs = smalltv

[env:smalltv]
platform = espressif8266
board = esp12e
framework = arduino

; ESP-12F on the SmallTV carries 4MB flash. Layout: 1MB LittleFS, rest for
; sketch + OTA (OTA needs room for two sketch copies).
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld

monitor_speed = 115200
upload_speed = 921600

; Low-memory lwIP variant leaves more heap for BearSSL (HTTPS) + the framebuffer-less
; display rendering. Bandwidth is irrelevant for the tiny JSON payloads we fetch.
; Full BearSSL (no BEARSSL_SSL_BASIC) so cash.ch's ECDHE-only CDN is reachable.
; The EC handshake is heavy on this chip, so the cost is contained: it's pinned
; to P-256 (BearSslTuning.cpp), only the cash.ch fetch offers ECDHE while Yahoo
; and the GitHub source are forced to the cheap static-RSA suites, the cash
; connection uses 512-byte buffers + TLS session resumption, and a fetch is
; skipped unless a large enough contiguous heap block is free.
build_flags =
	-D SMALLTV_ESP8266
	-D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
	-D ARDUINOJSON_USE_DOUBLE=0
	-D WITH_TICKER=0
	-D WITH_RADAR=0

; Feature folders on the include path so cross-module quote-includes resolve.
; These MUST be build_src_flags (project sources only), not build_flags — a global
; -Isrc leaks into the framework build and, on the ESP32 IDF, shadows internal
; headers like net.h/config.h (case-insensitively on Windows), breaking the build.
build_src_flags =
	-iquote src
	-iquote src/features/ticker
	-iquote src/features/usage
	-iquote src/features/radar

lib_deps =
	bblanchon/ArduinoJson @ ^7.2.0
	moononournation/GFX Library for Arduino @ ^1.5.0

; One firmware image ships all features; you switch between them in the web
; UI. The WITH_TICKER/WITH_USAGE/WITH_RADAR flags exist for optional local slim
; builds (add e.g. -D WITH_RADAR=0) but no separate images are published.

; ---------------------------------------------------------------------------
; Minimal OTA loader (src/loader.cpp). A tiny WiFi + web-OTA image, small
; enough to slip through a stock firmware whose updater rejects the full image
; for lack of space (e.g. the GeekMagic SmallTV-ultra). Flash it over the stock
; OTA, then flash the real firmware over the loader's /update. Pass WiFi at
; build time: -DLOADER_SSID='"MyNet"' -DLOADER_PASS='"secret"' (else it opens a
; SmallTV-Loader AP). build_src_filter compiles ONLY the loader.
; ---------------------------------------------------------------------------
[env:smalltv_loader]
platform = espressif8266
board = esp12e
framework = arduino
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
	-D LOADER_BUILD
	-D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
build_src_filter = -<*> +<loader.cpp>

; ---------------------------------------------------------------------------
; ESP-NOW bridge (src/bridge.cpp): flash onto any spare ESP32 dev board with a
; real USB-serial chip. Relays clawdmeter-daemon's --serial JSON lines to the
; SmallTV ESP8266 over ESP-NOW, since that board's own USB port carries no UART
; data lines (see README's flashing table). Edit PEER_MAC/WIFI_CHANNEL in
; bridge.cpp first (values come from the SmallTV's /api/status).
; ---------------------------------------------------------------------------
[env:espnow_bridge]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -D BRIDGE_BUILD
build_src_filter = -<*> +<bridge.cpp>

; ---------------------------------------------------------------------------
; ESP32-C2 / ESP8684 knockoff. Official espressif32 doesn't support the C2, so
; use the pioarduino fork (Arduino core 3.x / ESP-IDF 5.x). 4 MB flash: two OTA
; app slots + ~0.9 MB LittleFS (see partitions/smalltv_4mb_ota.csv). Flashed over
; the onboard CH340C on the USB-C port (auto-reset works, no button needed).
; ---------------------------------------------------------------------------
[env:smalltv_c2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c2-devkitm-1
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = partitions/smalltv_4mb_ota.csv

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; PlatformIO's bundled esptool hangs entering download mode on this board's CH340C.
; Flash the merged image with the system esptool instead (its auto-reset works).
; Needs a system Python with esptool installed (`pip install esptool`).
upload_protocol = custom
upload_command = python -m esptool --chip esp32c2 --baud 921600 write_flash 0x0 "$BUILD_DIR/firmware.factory.bin"

build_flags =
	-D SMALLTV_ESP32C2
	-D ARDUINOJSON_USE_DOUBLE=0

build_src_flags =
	-iquote src
	-iquote src/features/ticker
	-iquote src/features/usage
	-iquote src/features/radar

lib_deps =
	bblanchon/ArduinoJson @ ^7.2.0
	moononournation/GFX Library for Arduino @ ^1.5.0

; ---------------------------------------------------------------------------
; NMMiner NM-TV-154 ("NM-TV-Miner" PCB): classic ESP32 (ESP32-D0WD-V3 in a
; WROOM-32E, 40 MHz crystal), same 1.54" ST7789 panel. Confirmed working on
; hardware by a community tester (issue #1); pin map from the vendor's
; custom-firmware guide. Same pioarduino platform as the C2 so both ESP32
; targets get Arduino core 3.x (Platform.h's ESP32 branch needs it). 4 MB
; flash (confirmed): same two-OTA-slots + LittleFS layout as the C2.
; First flash over USB: esptool write_flash 0x0 firmware.factory.bin
; ---------------------------------------------------------------------------
[env:smalltv_esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = partitions/smalltv_4mb_ota.csv

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

build_flags =
	-D SMALLTV_ESP32
	-D ARDUINOJSON_USE_DOUBLE=0

build_src_flags =
	-iquote src
	-iquote src/features/ticker
	-iquote src/features/usage
	-iquote src/features/radar

lib_deps =
	bblanchon/ArduinoJson @ ^7.2.0
	moononournation/GFX Library for Arduino @ ^1.5.0
