; PlatformIO project for smalltv-mod
; Two board targets, both a 1.54" 240x240 ST7789 IPS display:
;   env:smalltv      GeekMagic SmallTV, ESP-12F (ESP8266)
;   env:smalltv_c2   knockoff SmallTV,  ESP32-C2 / ESP8684 (flashed over USB-C/CH340C)
;
; Build one:       pio run -e smalltv        /  pio run -e smalltv_c2
; Build artifact:  .pio/build/<env>/firmware.bin
; Flash via USB:   pio run -e <env> -t upload
; Flash via OTA:   upload firmware.bin through the device web UI (Update tab)
;
; License: WTFPL

[platformio]
default_envs = smalltv

[env:smalltv]
platform = espressif8266
board = esp12e
framework = arduino

; ESP-12F on the SmallTV carries 4MB flash. Layout: 1MB LittleFS, rest for
; sketch + OTA (OTA needs room for two sketch copies).
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld

monitor_speed = 115200
upload_speed = 921600

; Low-memory lwIP variant leaves more heap for BearSSL (HTTPS) + the framebuffer-less
; display rendering. Bandwidth is irrelevant for the tiny JSON payloads we fetch.
build_flags =
	-D SMALLTV_ESP8266
	-D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
	-D BEARSSL_SSL_BASIC
	-D ARDUINOJSON_USE_DOUBLE=0

; Feature folders on the include path so cross-module quote-includes resolve.
; These MUST be build_src_flags (project sources only), not build_flags — a global
; -Isrc leaks into the framework build and, on the ESP32 IDF, shadows internal
; headers like net.h/config.h (case-insensitively on Windows), breaking the build.
build_src_flags =
	-iquote src
	-iquote src/features/ticker
	-iquote src/features/usage
	-iquote src/features/radar

lib_deps =
	bblanchon/ArduinoJson @ ^7.2.0
	moononournation/GFX Library for Arduino @ ^1.5.0

; One firmware image ships all three features; you switch between them in the web
; UI. The WITH_TICKER/WITH_USAGE/WITH_RADAR flags exist for optional local slim
; builds (add e.g. -D WITH_RADAR=0) but no separate images are published.

; ---------------------------------------------------------------------------
; ESP32-C2 / ESP8684 knockoff. Official espressif32 doesn't support the C2, so
; use the pioarduino fork (Arduino core 3.x / ESP-IDF 5.x). 4 MB flash: two OTA
; app slots + ~0.9 MB LittleFS (see partitions/smalltv_4mb_ota.csv). Flashed over
; the onboard CH340C on the USB-C port (auto-reset works, no button needed).
; ---------------------------------------------------------------------------
[env:smalltv_c2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c2-devkitm-1
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = partitions/smalltv_4mb_ota.csv

monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; PlatformIO's bundled esptool hangs entering download mode on this board's CH340C.
; Flash the merged image with the system esptool instead (its auto-reset works).
; Needs a system Python with esptool installed (`pip install esptool`).
upload_protocol = custom
upload_command = python -m esptool --chip esp32c2 --baud 921600 write_flash 0x0 "$BUILD_DIR/firmware.factory.bin"

build_flags =
	-D SMALLTV_ESP32C2
	-D ARDUINOJSON_USE_DOUBLE=0

build_src_flags =
	-iquote src
	-iquote src/features/ticker
	-iquote src/features/usage
	-iquote src/features/radar

lib_deps =
	bblanchon/ArduinoJson @ ^7.2.0
	moononournation/GFX Library for Arduino @ ^1.5.0
